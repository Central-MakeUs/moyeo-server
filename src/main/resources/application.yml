spring:
  application:
    name: moyeo-server
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"

moyeo:
  jwt:
    access-token-validity-seconds: 86400
  oauth:
    apple:
      enabled: ${APPLE_OAUTH_ENABLED:false}
      client-id: ${APPLE_CLIENT_ID:}
      team-id: ${APPLE_TEAM_ID:}
      key-id: ${APPLE_KEY_ID:}
      private-key-base64: ${APPLE_PRIVATE_KEY_BASE64:}
      redirect-uri: ${APPLE_REDIRECT_URI:}
      token-uri: https://appleid.apple.com/auth/token
      jwks-uri: https://appleid.apple.com/auth/keys
      connect-timeout: 2s
      read-timeout: 3s
      jwks-cache-ttl: 1h
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://127.0.0.1:3000
      - http://127.0.0.1:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
    exposed-headers:
      - X-Trace-Id
    max-age-seconds: 3600
  departure-place-search:
    base-url: https://dapi.kakao.com
    rest-api-key: ${KAKAO_LOCAL_REST_API_KEY:}
    connect-timeout: 2s
    read-timeout: 3s
  meeting-cover:
    bucket: ${MEETING_COVER_S3_BUCKET:}
    region: ${AWS_REGION:ap-northeast-2}
    max-upload-size: 5MB
    max-width: 1280
    max-height: 720
    jpeg-quality: 0.85
