services:
  app:
    image: ${MOYEO_IMAGE}
    container_name: moyeo-server
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ${LOG_DIR:-./logs}:/app/logs
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APPLE_OAUTH_ENABLED: ${APPLE_OAUTH_ENABLED:-false}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY_BASE64: ${APPLE_PRIVATE_KEY_BASE64:-}
      APPLE_REDIRECT_URI: ${APPLE_REDIRECT_URI:-https://moyeo-dev.vercel.app/auth/callback/apple}
      KAKAO_LOCAL_REST_API_KEY: ${KAKAO_LOCAL_REST_API_KEY:-}
      MEETING_COVER_S3_BUCKET: ${MEETING_COVER_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health | grep -q OK"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
